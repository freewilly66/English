<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
  <title>Stock Agents Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --bg-sub: #fafafa;
      --text: #09090b;
      --text-sub: #71717a;
      --border: #e4e4e7;
      --accent: #18181b;
      --accent-hover: #27272a;
      --card-bg: #ffffff;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --radius: 16px;
    }
    
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #09090b;
        --bg-sub: #18181b;
        --text: #fafafa;
        --text-sub: #a1a1aa;
        --border: #27272a;
        --accent: #fafafa;
        --accent-hover: #f4f4f5;
        --card-bg: #18181b;
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.3), 0 2px 4px -2px rgb(0 0 0 / 0.3);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-sub);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 480px;
      width: 100%;
      margin-top: 2rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .header-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      display: inline-block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin-bottom: 0.5rem;
    }

    p.subtitle {
      color: var(--text-sub);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-sm);
    }

    .card:hover, .card:active {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: var(--text-sub);
    }

    .card-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
      background: var(--bg-sub);
      border: 1px solid var(--border);
    }

    .card-us .card-icon { background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.2); color: #3b82f6; }
    .card-kr .card-icon { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); color: #ef4444; }

    .card-content { flex: 1; }

    .card-title {
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 0.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--text-sub);
      line-height: 1.4;
    }

    .card-arrow {
      color: var(--text-sub);
      opacity: 0.5;
      transition: transform 0.2s;
    }

    .card:hover .card-arrow {
      transform: translateX(4px);
      opacity: 1;
    }

    .footer {
      margin-top: 3rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-sub);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <div class="header-icon">🌍</div>
      <h1>My AI Agents</h1>
      <p class="subtitle">모든 투자 및 개인 업무를 하나의 시스템에서 관리하세요. 아래 메뉴를 선택해 개별 앱으로 진입합니다.</p>
    </div>

    <!-- US Agent Link -->
    <a href="us-stock-agent/index.html" class="card card-us">
      <div class="card-icon">🇺🇸</div>
      <div class="card-content">
        <div class="card-title">US Stock AI</div>
        <div class="card-desc">미국 주식 시장 자율 탐색 및 관리</div>
      </div>
      <div class="card-arrow">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </div>
    </a>

    <!-- KR Agent Link -->
    <a href="kr-stock-agent/index.html" class="card card-kr">
      <div class="card-icon">🇰🇷</div>
      <div class="card-content">
        <div class="card-title">Korean Stock AI</div>
        <div class="card-desc">국내 KOSPI/KOSDAQ 종목 분석 및 관리</div>
      </div>
      <div class="card-arrow">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </div>
    </a>

    <div class="footer">
      Version: Modular Release Beta
    </div>
  </div>

</body>
</html>
