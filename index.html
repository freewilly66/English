<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="영어듣기">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<title>영어 듣기 트래커</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{
  --pri:#16a085;--pri-l:#e8f8f5;--pri-b:#16a08530;
  --acc:#e74c3c;--warm:#f39c12;--bbc:#c0392b;--voa:#2980b9;
  --bg:#fafbfc;--sf:#fff;--sf2:#f0f2f5;
  --tx:#16213e;--tx2:#576574;--tx3:#a4b0be;
  --bd:#e8ecf1;--rad:14px;--rad-s:10px;
  --font:'Noto Sans KR',system-ui,-apple-system,sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0a0a14;--sf:#141422;--sf2:#1e1e32;--tx:#e8e8f0;--tx2:#9898b0;--tx3:#5a5a78;--bd:#2a2a40;--pri-l:#0d2a24;--pri-b:#16a08540;
}}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:var(--font);overscroll-behavior:none;font-size:14px}
#app{max-width:500px;margin:0 auto;height:100%;display:flex;flex-direction:column}
.hdr{padding:calc(env(safe-area-inset-top,0px)+10px) 20px 10px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;z-index:10}
.hdr-top{display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:18px;font-weight:900;letter-spacing:-0.5px}
.hdr .sub{font-size:11px;color:var(--tx3);margin-top:1px}
.nb{padding:5px 12px;border-radius:20px;border:1.5px solid var(--bd);background:transparent;color:var(--tx2);font-size:11px;font-weight:600;cursor:pointer;-webkit-appearance:none}
.nb.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(env(safe-area-inset-bottom,0px)+88px)}
/* Hero */
.hero-pw{position:relative;overflow:hidden;background:#111}
.hero-pw img{width:100%;max-height:220px;object-fit:cover;display:block}
.hero{background:linear-gradient(135deg,#16a085,#1abc9c,#2ecc71);padding:22px 20px 18px;color:#fff}
.hero-e{font-size:36px;margin-bottom:4px}
.hero-t{font-size:13px;font-weight:600;opacity:.9}
.qbox{margin-top:12px;background:rgba(255,255,255,.13);border-radius:var(--rad-s);padding:11px 13px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.qen{font-size:13px;font-weight:700;line-height:1.5;font-style:italic}
.qko{font-size:10px;margin-top:4px;opacity:.75}
.qby{font-size:9px;margin-top:3px;opacity:.5;text-align:right}
.sec{padding:12px 20px}
.slb{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
/* Nag */
.nag{border-radius:var(--rad-s);padding:10px 12px;font-size:12px;font-weight:600;margin-bottom:4px}
.nag.l1{background:#fef9f0;color:#d35400;border:1px solid #e67e2230}
.nag.l2{background:#fff5f0;color:#c0392b;border:1px solid #e74c3c30}
.nag.l3{background:#fff0f0;color:#922b21;border:1px solid #c0392b40;animation:shk .6s}
@media(prefers-color-scheme:dark){.nag.l1{background:#2a1f0a;color:#f0a050}.nag.l2{background:#2a0f0f;color:#f08080}.nag.l3{background:#2a0808;color:#f06060}}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes popin{0%{transform:scale(.85);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
/* Info */
.ibox{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rad);padding:12px 14px}
.il{font-size:12px;color:var(--tx2);padding:2px 0;display:flex;justify-content:space-between}.il .v{font-weight:700;color:var(--tx)}
/* Stats */
.sg3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.sc{background:var(--sf);border-radius:var(--rad-s);padding:10px;border:1px solid var(--bd);text-align:center}
.sc.dn{background:var(--pri-l);border-color:var(--pri-b)}
.sc .n{font-size:24px;font-weight:900;line-height:1.1}
.sc .l{font-size:10px;color:var(--tx3);margin-top:2px}
/* Week */
.wg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.dc{text-align:center}
.db{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.db.done{background:var(--pri);color:#fff}.db.today{background:var(--sf2);border:2px solid var(--pri)}.db.fut{background:var(--sf2);opacity:.3}.db.past{background:var(--sf2)}
.dn-txt{font-size:9px;color:var(--tx3);margin-top:2px}.dn-txt.tl{color:var(--tx);font-weight:700}.dn-txt.su{color:var(--acc)}.dn-txt.sa{color:var(--voa)}
/* Video cards */
.vc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rad);overflow:hidden;margin-bottom:8px}
.vc-hd{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid var(--bd)}
.vc-badge{font-size:10px;font-weight:700;color:#fff;padding:2px 7px;border-radius:4px}
.vc-badge.bbc{background:var(--bbc)}.vc-badge.voa{background:var(--voa)}
.vc-name{font-size:12px;font-weight:600;color:var(--tx2)}
.vc-body{display:flex;gap:10px;padding:10px 12px;cursor:pointer;align-items:center}
.vc-body:active{background:var(--sf2)}
.vc-thumb{width:110px;height:62px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--sf2)}
.vc-info{flex:1;min-width:0}
.vc-title{font-size:12px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vc-meta{font-size:10px;color:var(--tx3);margin-top:4px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.vc.listened .vc-title{color:var(--tx2)}
.vc.listened{background:var(--pri-l)}
.fi-new{font-size:9px;font-weight:700;color:#fff;background:var(--acc);padding:1px 5px;border-radius:3px}
.fi-date{font-size:9px;font-weight:600;color:var(--tx2);background:var(--sf2);padding:1px 5px;border-radius:3px}
.fi-ok{font-size:9px;font-weight:700;color:var(--pri)}
.ai-badge{font-size:8px;font-weight:700;color:#fff;background:linear-gradient(135deg,#8b5cf6,#6366f1);padding:1px 5px;border-radius:3px}
.ai-spin{font-size:8px;font-weight:700;color:var(--warm);border:1px solid var(--warm);padding:1px 5px;border-radius:3px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.vc-time{font-size:9px;color:var(--pri);font-weight:700}
/* Progress bar + btn */
.pbar{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rad);padding:12px 14px;margin-bottom:8px}
.pbar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pbar-lbl{font-size:12px;font-weight:700}
.pbar-cnt{font-size:13px;font-weight:900;color:var(--pri)}
.pbar-bg{height:7px;background:var(--sf2);border-radius:4px;overflow:hidden}
.pbar-fill{height:100%;background:var(--pri);border-radius:4px;transition:width .4s}
.pbar-hint{font-size:10px;color:var(--tx3);margin-top:5px;text-align:center}
.bdone{background:var(--pri-l);border:1px solid var(--pri-b);border-radius:var(--rad);padding:18px 14px;text-align:center}
.bdone.anim{animation:popin .5s forwards}
.bdone .how{font-size:10px;color:var(--tx2);margin-top:4px}
.bdone .mins{font-size:12px;color:var(--pri);font-weight:700;margin-top:4px}
.btn-man{width:100%;padding:14px;background:var(--pri);color:#fff;border:none;border-radius:var(--rad);font-size:14px;font-weight:700;cursor:pointer;-webkit-appearance:none;margin-top:6px}
.btn-man:active{opacity:.7}
/* Content tab */
.vtb{display:flex;gap:3px;margin-bottom:10px;background:var(--sf2);padding:3px;border-radius:var(--rad-s)}
.vtb button{flex:1;padding:7px 2px;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:var(--tx2);-webkit-appearance:none;white-space:nowrap}
.vtb button.on{background:var(--pri);color:#fff}
.olink{display:block;padding:11px 14px;border-radius:var(--rad-s);font-size:13px;font-weight:700;color:#fff;text-align:center;text-decoration:none;margin-bottom:8px}
.olink.bbc{background:var(--bbc)}.olink.voa{background:var(--voa)}
.citem{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd);text-decoration:none;color:var(--tx)}.citem:last-child{border-bottom:none}
.cdesc{font-size:10px;color:var(--tx3)}
/* Vocab */
.vadd{width:100%;padding:11px;background:var(--sf);border:2px dashed var(--bd);border-radius:var(--rad-s);color:var(--tx3);font-size:12px;font-weight:700;cursor:pointer;margin-bottom:10px;-webkit-appearance:none}
.vadd:active{background:var(--sf2)}
.vfl{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.vfb{padding:4px 10px;border:1px solid var(--bd);border-radius:12px;background:transparent;font-size:10px;font-weight:700;color:var(--tx2);cursor:pointer;-webkit-appearance:none}
.vfb.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.vgh{font-size:11px;font-weight:700;color:var(--pri);margin-bottom:6px;display:flex;justify-content:space-between}.vgh .cnt{font-weight:400;color:var(--tx3);font-size:10px}
.vcd{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rad-s);padding:10px 12px;margin-bottom:6px;position:relative}
.vcd .ven{font-size:13px;font-weight:700;line-height:1.4}.vcd .vko{font-size:11px;color:var(--tx2);margin-top:3px;line-height:1.3}
.vcd .vdt{font-size:9px;color:var(--tx3);margin-top:4px}
.vcd .va{position:absolute;top:8px;right:8px;display:flex;gap:2px}
.vcd .va button{background:none;border:none;font-size:13px;cursor:pointer;padding:1px 3px;color:var(--tx3);-webkit-appearance:none}
.vempty{text-align:center;padding:30px 20px;color:var(--tx3);font-size:12px;line-height:1.7}
/* Flashcard */
.fcw{text-align:center;padding:16px 0}
.fcc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rad);padding:28px 18px;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;margin-bottom:14px}
.fcc:active{transform:scale(.97)}
.fcen{font-size:18px;font-weight:900}.fcko{font-size:13px;color:var(--tx2);margin-top:10px;opacity:0;transition:opacity .3s}.fcko.sh{opacity:1}
.fch{font-size:10px;color:var(--tx3);margin-top:6px}.fccat{font-size:9px;font-weight:700;color:var(--pri);margin-bottom:6px}
.fcnav{display:flex;gap:10px;justify-content:center}
.fcnav button{padding:9px 22px;border-radius:18px;border:1px solid var(--bd);background:var(--sf);font-size:12px;font-weight:700;cursor:pointer;color:var(--tx);-webkit-appearance:none}
.fcnav button.pr{background:var(--pri);color:#fff;border-color:var(--pri)}
.fccnt{font-size:11px;color:var(--tx3);margin-bottom:10px}
/* Settings */
.sg{margin-bottom:14px}.sgt{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.sr{display:flex;justify-content:space-between;align-items:center;background:var(--sf);border-radius:var(--rad-s);padding:12px 14px;border:1px solid var(--bd);margin-bottom:6px}
.sr p{font-size:12px;font-weight:600}.sr small{font-size:11px;color:var(--tx2);display:block;margin-top:1px}
.sctrl{display:flex;gap:5px;align-items:center;flex-shrink:0}
.tbtn{padding:7px 14px;border:none;border-radius:18px;font-size:12px;font-weight:700;cursor:pointer;-webkit-appearance:none}
.tbtn.on{background:var(--acc);color:#fff}.tbtn.off{background:var(--pri);color:#fff}
.gbtn{padding:5px 12px;border:1.5px solid var(--bd);border-radius:14px;background:transparent;color:var(--tx2);font-size:12px;font-weight:700;cursor:pointer;-webkit-appearance:none}
.gbtn.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.tinp{padding:5px 8px;border:1.5px solid var(--bd);border-radius:7px;font-size:13px;background:var(--sf);color:var(--tx);-webkit-appearance:none;text-align:center;width:80px}
.minp{padding:5px 8px;border:1.5px solid var(--bd);border-radius:7px;font-size:13px;background:var(--sf);color:var(--tx);-webkit-appearance:none;text-align:center;width:60px}
.sb{padding:8px 16px;border-radius:var(--rad-s);font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--bd);background:var(--sf);color:var(--tx);-webkit-appearance:none;margin-right:6px;margin-bottom:6px}
.sb:active{opacity:.7}.sb.dng{border-color:var(--acc);color:var(--acc)}.sb.pr{background:var(--pri);color:#fff;border-color:var(--pri)}
/* Calendar */
.cnv{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.cnv button{background:none;border:none;font-size:16px;cursor:pointer;padding:4px 10px;color:var(--tx);-webkit-appearance:none}
.cmn{font-size:13px;font-weight:700}
.cgr{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cgh{font-size:9px;color:var(--tx3);padding:3px 0;font-weight:700}
.cgd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:11px;border-radius:5px;color:var(--tx3)}
.cgd.cm{color:var(--tx)}.cgd.dd{background:var(--pri);color:#fff;font-weight:700}.cgd.td{border:2px solid var(--pri);font-weight:700}
.cst{margin-top:8px;font-size:11px;color:var(--tx2)}.cst b{color:var(--tx)}
/* Modal */
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.mob{background:var(--bg);border-radius:14px 14px 0 0;width:100%;max-width:500px;padding:18px 18px calc(env(safe-area-inset-bottom,0px)+18px);max-height:85vh;overflow-y:auto}
.mot{font-size:15px;font-weight:900;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.mot button{background:none;border:none;font-size:20px;cursor:pointer;color:var(--tx3);-webkit-appearance:none}
.mf{margin-bottom:12px}.mf label{font-size:11px;font-weight:700;color:var(--tx2);display:block;margin-bottom:4px}
.mf input,.mf textarea{width:100%;padding:9px 11px;border:1.5px solid var(--bd);border-radius:var(--rad-s);font-size:13px;background:var(--sf);color:var(--tx);font-family:var(--font);-webkit-appearance:none}
.mf textarea{min-height:50px;resize:vertical}
.mcts{display:flex;gap:5px;flex-wrap:wrap}
.mcts button{padding:5px 12px;border:1.5px solid var(--bd);border-radius:14px;background:transparent;font-size:11px;font-weight:700;color:var(--tx2);cursor:pointer;-webkit-appearance:none}
.mcts button.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.msv{width:100%;padding:12px;background:var(--pri);color:#fff;border:none;border-radius:var(--rad);font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;-webkit-appearance:none}
.msv:active{opacity:.7}
/* Toast */
.toast{position:fixed;top:calc(env(safe-area-inset-top,0px)+56px);left:50%;transform:translateX(-50%);background:var(--sf);border:1px solid var(--pri);border-radius:18px;padding:8px 18px;font-size:12px;font-weight:700;color:var(--pri);box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:300;white-space:nowrap;animation:ti .3s ease,to .3s ease 2.7s forwards}
.toast.err{border-color:var(--acc);color:var(--acc)}.toast.inf{border-color:var(--warm);color:var(--warm)}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%)}}
@keyframes to{from{opacity:1}to{opacity:0}}
/* Nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid var(--bd);display:flex;padding:0 0 env(safe-area-inset-bottom,0);z-index:100}
.nbtn{flex:1;padding:12px 0 14px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--tx3);font-size:11px;font-weight:600;-webkit-appearance:none}
.nbtn.on{color:var(--pri)}.ni{font-size:24px;line-height:1}
.pg{display:none}.pg.on{display:block}
.ihint{background:var(--sf2);border-radius:var(--rad-s);padding:12px;font-size:12px;color:var(--tx2);line-height:1.6}
button,a{cursor:pointer}a{text-decoration:none}
</style>
</head>
<body>
<div id="app">
  <div class="hdr"><div class="hdr-top"><div><h1>🎧 영어 듣기 트래커</h1><div class="sub" id="h-date"></div></div><button class="nb" id="notif-btn" onclick="toggleNotif()">🔕 알림</button></div></div>
  <div class="scr" id="main-scr">
    <!-- HOME -->
    <div class="pg on" id="pg-home">
      <div class="hero-pw" id="hero-pw" style="display:none"><img id="hero-img" alt=""></div>
      <div class="hero"><div class="hero-e">🎧</div><div class="hero-t" id="hero-t"></div><div class="qbox" id="qbox"></div></div>
      <div class="sec" id="nag-w"></div>
      <div class="sec" id="prog-w"></div>
      <div class="sec"><div class="slb">이번 주 통계</div><div class="sg3" id="sg3"></div></div>
      <div class="sec"><div class="slb" id="wlbl"></div><div class="wg" id="wg"></div></div>
      <div class="sec"><div class="slb"><span>오늘의 콘텐츠</span><button style="background:none;border:none;font-size:11px;color:var(--tx3);cursor:pointer" onclick="loadFeeds(true)">↻ 새로고침</button></div><div id="fw"><div style="padding:12px;text-align:center;font-size:12px;color:var(--tx3)">불러오는 중...</div></div></div>
      <div class="sec" id="aw"></div>
    </div>
    <!-- CONTENT -->
    <div class="pg" id="pg-content"><div class="sec">
      <div class="vtb"><button class="on" id="vt-bbc" onclick="setTab('bbc')">BBC</button><button id="vt-voa" onclick="setTab('voa')">VOA</button><button id="vt-vocab" onclick="setTab('vocab')">📝 단어장</button></div>
      <div id="clist"></div>
      <div id="varea" style="display:none"><button class="vadd" onclick="openVM()">+ 새 단어/표현 추가</button><div class="vfl" id="vfl"></div><div id="vlist"></div><div id="fcarea" style="display:none"></div></div>
    </div></div>
    <!-- SETTINGS -->
    <div class="pg" id="pg-set"><div class="sec">
      <div class="sg"><div class="sgt">🎯 목표</div>
        <div class="sr"><div><p>주간 목표</p><small>일주일에 며칠?</small></div><div class="sctrl" id="gbtn-w"></div></div>
        <div class="sr"><div><p>하루 학습 시간</p><small>목표 (분)</small></div><div class="sctrl"><input type="number" class="minp" id="minp" min="5" max="120" step="5" onchange="setDMin(this.value)"><span style="font-size:11px;color:var(--tx3)">분</span></div></div>
      </div>
      <div class="sg"><div class="sgt">🔔 알림</div>
        <div class="sr"><div><p>반복 알림</p><small>미완료시 90분마다</small></div><button class="tbtn off" id="s-nb" onclick="toggleNotif()">켜기</button></div>
        <div class="sr"><div><p>리마인더</p><small>매일 알림 시간</small></div><div class="sctrl"><input type="time" class="tinp" id="tinp" onchange="setRTime(this.value)"></div></div>
      </div>
      <div class="sg"><div class="sgt">🤖 AI 단어 자동추출</div>
        <div class="sr" style="flex-wrap:wrap;gap:6px"><div style="flex:1;min-width:150px"><p>Anthropic API 키</p><small id="ak-st"></small></div><div class="sctrl"><button class="sb pr" id="ak-btn" onclick="toggleAK()">입력</button></div></div>

}

// ── Helpers ──

}

// ── Date helpers ──
function gWeek(){var t=new Date(),dw=t.getDay(),s=new Date(t);s.setDate(t.getDate()-dw);return Array.from({length:7},function(_,i){var d=new Date(s);d.setDate(s.getDate()+i);return d.toISOString().slice(0,10);});}

function streak(){var n=0,d=new Date();while(S.history[d.toISOString().slice(0,10)]){n++;d.setDate(d.getDate()-1);}return n;}
function fDay(){var k=Object.keys(S.history).filter(function(k){return S.history[k];}).sort();return k[0]||null;}
function tDone(){return Object.values(S.history).filter(Boolean).length;}
function dBtw(a,b){return Math.round((new Date(b+'T12:00:00')-new Date(a+'T12:00:00'))/864e5);}
function nLvl(){if(S.history[TD])return 0;var h=new Date().getHours();return h<10?0:h<15?1:h<20?2:3;}

function startNag(){clearInterval(nagT);if(!S.notif)return;nagT=setInterval(function(){if(S.history[TD])return;var m=nMsgs[Math.floor(Math.random()*nMsgs.length)];try{if('serviceWorker'in navigator&&navigator.serviceWorker.controller)navigator.serviceWorker.controller.postMessage({type:'NAG',msg:m});else if(typeof Notification!=='undefined'&&Notification.permission==='granted')new Notification('📢',{body:m,icon:'./icon.svg'});}catch(e){}},54e5);}
function toggleNotif(){try{if(S.notif){S.notif=false;clearInterval(nagT);sv();render();rSet();return;}if(typeof Notification==='undefined'){alert('알림 미지원');return;}Notification.requestPermission().then(function(p){if(p==='granted'){S.notif=true;sv();startNag();render();rSet();}else alert('권한 거부');});}catch(e){if(S.notif){S.notif=false;clearInterval(nagT);sv();render();rSet();}}}
window.toggleNotif=toggleNotif;

window.markDone=markDone;

function setRTime(v){if(!v)return;var p=v.split(':');S.rH=parseInt(p[0])||9;S.rM=parseInt(p[1])||0;sv();}window.setRTime=setRTime;
function goPage(p){document.querySelectorAll('.pg').forEach(function(e){e.classList.remove('on');});document.getElementById('pg-'+p).classList.add('on');document.querySelectorAll('.nbtn').forEach(function(e){e.classList.remove('on');});document.getElementById('n-'+p).classList.add('on');document.getElementById('main-scr').scrollTop=0;if(p==='set'){rSet();rCal();}if(p==='content')rContent();}

function impData(inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){try{var d=JSON.parse(e.target.result);if(!d.state){alert('유효하지 않음');return;}if(!confirm('교체?'))return;S=Object.assign({},DF,d.state);lR=d.listened||{};lT=new Set(lR[TD]||[]);vocD=d.vocab||[];watchLog=d.watch||{};azd=d.analyzed||{};if(d.apiKey)try{localStorage.setItem('eh_ak',d.apiKey);AK=d.apiKey;}catch(e){}if(d.photo)try{localStorage.setItem('eh_photo',d.photo);}catch(e){}sv();svL();svV();lS('eh_analyzed',azd);lS('eh_watch',watchLog);render();rCal();alert('복원 완료');}catch(err){alert('오류: '+err.message);}};r.readAsText(f);inp.value='';}window.impData=impData;

function toggleAK(){var w=document.getElementById('ak-w');w.style.display=w.style.display==='none'?'block':'none';document.getElementById('ak-inp').value=AK;}window.toggleAK=toggleAK;
function saveAK(){var k=document.getElementById('ak-inp').value.trim();if(k&&!k.startsWith('sk-')){alert('sk-로 시작해야 합니다');return;}try{if(k)localStorage.setItem('eh_ak',k);else localStorage.removeItem('eh_ak');}catch(e){}AK=k;document.getElementById('ak-w').style.display='none';rAKSt();showToast(k?'API 키 저장':'키 삭제됨',k?'':'inf');}window.saveAK=saveAK;

function upPhoto(inp){var f=inp.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(e){var img=new Image();img.onload=function(){var c=document.createElement('canvas'),M=800,w=img.width,h=img.height;if(w>M||h>M){if(w>h){h=Math.round(h*M/w);w=M;}else{w=Math.round(w*M/h);h=M;}}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);try{localStorage.setItem('eh_photo',c.toDataURL('image/jpeg',0.6));rPhoto();rSet();showToast('사진 설정됨');}catch(er){alert('용량 초과');}};img.src=e.target.result;};rd.readAsDataURL(f);inp.value='';}window.upPhoto=upPhoto;

// ── YouTube Feed Fetch ──
function gCache(id){try{var r=lG('fc_'+id,null);if(!r)return null;if(Date.now()-r.t>CTL)return null;return r.d;}catch(e){return null;}}
function gStale(id){try{var r=lG('fc_'+id,null);return r?r.d:null;}catch(e){return null;}}
function sCache(id,d){lS('fc_'+id,{t:Date.now(),d:d});}

function parseAtom(xml){
  try{
    var doc=new DOMParser().parseFromString(xml,'text/xml');
    var entries=doc.querySelectorAll('entry');
    var r=[];
    for(var i=0;i<Math.min(entries.length,5);i++){
      var en=entries[i];
      var vid=en.getElementsByTagName('yt:videoId')[0];
      var videoId=vid?vid.textContent:'';
      var title=(en.querySelector('title')||{}).textContent||'';
      var pub=(en.querySelector('published')||{}).textContent||'';
      var mg=en.getElementsByTagName('media:group')[0];
      var desc=mg?((mg.getElementsByTagName('media:description')[0]||{}).textContent||''):'';
      var date='';if(pub)try{date=new Date(pub).toISOString().slice(0,10);}catch(e){}
      if(videoId)r.push({videoId:videoId,title:title,date:date,desc:desc,thumb:'https://i.ytimg.com/vi/'+videoId+'/mqdefault.jpg',url:'https://www.youtube.com/watch?v='+videoId});
    }
    return r;
  }catch(e){return null;}
}

function fetchCh(ch){
  var c=gCache(ch.id);if(c)return Promise.resolve({ch:ch,items:c});
  var feedUrl='https://www.youtube.com/feeds/videos.xml?channel_id='+ch.id;
  var proxies=[
    function(u){return'https://api.allorigins.win/get?url='+encodeURIComponent(u);},
    function(u){return'https://api.allorigins.win/raw?url='+encodeURIComponent(u);},
    function(u){return'https://corsproxy.io/?url='+encodeURIComponent(u);}
  ];
  function tryP(idx){
    if(idx>=proxies.length){var st=gStale(ch.id);return st?Promise.resolve({ch:ch,items:st,stale:true}):Promise.resolve({ch:ch,items:null,err:'로드 실패'});}
    return fetch(proxies[idx](feedUrl)).then(function(r){
      if(!r.ok)throw new Error(r.status);
      var ct=r.headers.get('content-type')||'';
      return ct.includes('json')?r.json().then(function(j){return j.contents||'';}):r.text();
    }).then(function(txt){
      if(!txt||!txt.includes('<feed'))throw new Error('no feed');
      var items=parseAtom(txt);if(!items||!items.length)throw new Error('parse');
      sCache(ch.id,items);return{ch:ch,items:items};
    }).catch(function(){return tryP(idx+1);});
  }
  return tryP(0);
}

function onEpTap(url){

  if(lT.has(url))return;

    S.history[TD]=true;sv();
    var aw=document.getElementById('aw');
    if(aw)aw.innerHTML='<div class="bdone anim"><div style="font-size:32px;margin-bottom:6px">🎉</div><div style="font-size:15px;font-weight:900;color:var(--pri)">오늘 완료!</div><div class="how">모든 콘텐츠 확인 완료</div></div>';
    setTimeout(render,2000);
  }
  analyzeEp(url);
}
window.onEpTap=onEpTap;

// ── Feed Render ──
function renderFR(results){
  lastFR=results;allEps=new Set();
  var w=document.getElementById('fw');if(!w)return;
  w.innerHTML=results.map(function(r){
    var ch=r.ch,items=r.items,stale=r.stale;
    if(!items||!items.length)return'<div class="vc"><div class="vc-hd"><span class="vc-badge '+ch.cls+'">'+ch.badge+'</span><span class="vc-name">'+ch.name+'</span></div><div style="padding:10px 12px;font-size:11px;color:var(--tx3)">피드 로드 실패</div></div>';
    // Find first unwatched, or latest
    var item=null;
    for(var i=0;i<items.length;i++){if(!lT.has(items[i].url)){item=items[i];break;}}
    if(!item)item=items[0];
    allEps.add(item.url);
    var ls=lT.has(item.url);
    var isNew=isTD(item.date);
    var dh=isNew?'<span class="fi-new">NEW</span>':item.date?'<span class="fi-date">'+(function(){var d=new Date(item.date+'T12:00:00');return(d.getMonth()+1)+'/'+ d.getDate();}())+'</span>':'';
    var aib='';if(azd[item.url])aib='<span class="ai-badge">AI✓</span>';else if(azing[item.url])aib='<span class="ai-spin">AI…</span>';
    var stN=stale?'<div style="font-size:9px;color:var(--warm);padding:2px 12px 6px">⚠ 캐시된 데이터</div>':'';
    return'<div class="vc'+(ls?' listened':'')+'"><div class="vc-hd"><span class="vc-badge '+ch.cls+'">'+ch.badge+'</span><span class="vc-name">'+ch.name+'</span></div><div class="vc-body" onclick="onEpTap(\''+item.url.replace(/'/g,'%27')+'\')"><img class="vc-thumb" src="'+item.thumb+'" loading="lazy" alt=""><div class="vc-info"><div class="vc-title">'+esc(item.title)+'</div><div class="vc-meta">'+dh+(ls?' <span class="fi-ok">✓ 시청</span>':'')+aib+'</div></div></div>'+stN+'</div>';
  }).join('');
  rAA();
}

function rAA(){
  var aw=document.getElementById('aw');if(!aw)return;
  if(S.history[TD]){
    var mins=watchLog[TD]?Math.floor(watchLog[TD]/60):0;
    aw.innerHTML='<div class="bdone"><div style="font-size:24px;margin-bottom:4px">🎉</div><div style="font-size:14px;font-weight:900;color:var(--pri)">오늘 완료!</div>'+(mins>0?'<div class="mins">오늘 학습 '+mins+'분</div>':'')+'</div>';
    return;
  }
  var tot=allEps.size,op=Array.from(allEps).filter(function(u){return lT.has(u);}).length,pct=tot>0?Math.round(op/tot*100):0;
  var h='';
  if(tot>0)h+='<div class="pbar"><div class="pbar-top"><span class="pbar-lbl">콘텐츠 확인</span><span class="pbar-cnt">'+op+'/'+tot+'</span></div><div class="pbar-bg"><div class="pbar-fill" style="width:'+pct+'%"></div></div><div class="pbar-hint">👆 모두 열면 자동 완료</div></div>';
  h+='<button class="btn-man" onclick="markDone()">오늘 듣기 완료 ✓</button>';
  aw.innerHTML=h;
}

function loadFeeds(force){
  var w=document.getElementById('fw');if(!w)return;
  if(force)CHS.forEach(function(ch){try{localStorage.removeItem('fc_'+ch.id);}catch(e){}});
  var ca=CHS.map(function(ch){var f=gCache(ch.id);if(f)return{ch:ch,items:f};var s=gStale(ch.id);return s?{ch:ch,items:s,stale:true}:{ch:ch,items:null};});
  if(ca.some(function(r){return r.items;}))renderFR(ca);
  else w.innerHTML='<div style="padding:12px;text-align:center;font-size:12px;color:var(--tx3)">불러오는 중...</div>';
  Promise.all(CHS.map(fetchCh)).then(function(res){renderFR(res);}).catch(function(e){console.error(e);});
}
window.loadFeeds=loadFeeds;

// ── AI Analysis ──
function findEpData(url){for(var i=0;i<lastFR.length;i++){var items=lastFR[i].items;if(!items)continue;for(var j=0;j<items.length;j++){if(items[j].url===url)return{ch:lastFR[i].ch,item:items[j]};};}return null;}
function analyzeEp(url){
  if(!AK||azd[url]||azing[url])return;
  var ep=findEpData(url);if(!ep)return;
  var title=ep.item.title||'';if(!title)return;
  var desc=(ep.item.desc||'').slice(0,1200);
  var chName=ep.ch.name||'';
  azing[url]=true;renderFR(lastFR);showToast('🤖 AI 분석 시작...','inf');
  var prompt='You are an English vocabulary extractor for Korean ESL learners.\n\nSource: '+chName+'\nTitle: '+title+'\n'+(desc?'Description: '+desc+'\n':'(No description)\n')+'\nExtract 3-6 useful items Korean learners should study: vocabulary, idioms, expressions, grammar.\nFor each: "en" (English), "ko" (Korean meaning+brief explanation), "cat" (exactly one of: 단어, 관용구, 표현, 문법)\n\nRespond ONLY with a JSON array:\n[{"en":"...","ko":"...","cat":"..."}]';
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':AK,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})})
  .then(function(r){if(!r.ok)throw new Error('API '+r.status);return r.json();})
  .then(function(data){
    var txt='';if(data.content)data.content.forEach(function(c){if(c.type==='text')txt+=c.text;});
    var m=txt.match(/\[[\s\S]*\]/);if(!m)throw new Error('No JSON');
    var items=JSON.parse(m[0]);var added=0;
    items.forEach(function(it){if(!it.en||!it.ko)return;var cat=VCATS.indexOf(it.cat)>=0?it.cat:'단어';var dup=vocD.some(function(v){return v.en.toLowerCase()===it.en.toLowerCase();});if(!dup){vocD.unshift({id:'v'+Date.now()+Math.random().toString(36).substr(2,4),en:it.en,ko:it.ko,cat:cat,date:TD,src:chName,auto:true});added++;}});
    if(added>0){svV();showToast('📝 '+added+'개 자동 추가!');}
    azd[url]=true;lS('eh_analyzed',azd);delete azing[url];renderFR(lastFR);
  }).catch(function(err){console.error(err);delete azing[url];renderFR(lastFR);showToast('AI 실패: '+err.message,'err');});
}

// ── Settings render ──
function rSet(){
  var gb=document.getElementById('gbtn-w');if(gb)gb.innerHTML=[5,6,7].map(function(n){return'<button class="gbtn'+(S.wGoal===n?' on':'')+'" onclick="setWG('+n+')">'+n+'일</button>';}).join('');
  var snb=document.getElementById('s-nb');if(snb){snb.textContent=S.notif?'끄기':'켜기';snb.className='tbtn '+(S.notif?'on':'off');}
  var ti=document.getElementById('tinp');if(ti)ti.value=String(S.rH).padStart(2,'0')+':'+String(S.rM).padStart(2,'0');
  var mi=document.getElementById('minp');if(mi)mi.value=S.dMin;
  var sdl=document.getElementById('sd-lbl');if(sdl){var fd=fDay();sdl.textContent=fd?'현재: '+fKo(fd):'기록 없음';}
  rAKSt();rPhoto();
}

// ── Content tab render ──
var CT={bbc:{label:'BBC',cls:'bbc',url:'https://www.youtube.com/@bbclearningenglish',items:[['6 Minute English','https://www.youtube.com/playlist?list=PLcetZ6gSk96-FECmH9l7Vlx5VDigvgkzp','초·중급 • 6분'],['The English We Speak','https://www.youtube.com/playlist?list=PLcetZ6gSk96yyqJSI8vxNaOpHrmeLBwYD','관용어 • 3분'],['News Review','https://www.youtube.com/playlist?list=PLcetZ6gSk96-5DGCSTxIq0Sy_sbiAYtyJ','중·고급 • 뉴스']]},
  voa:{label:'VOA',cls:'voa',url:'https://www.youtube.com/@voabordo',items:[['Learning English','https://www.youtube.com/@VOALearningEnglish','전체'],['Everyday Grammar','https://www.youtube.com/playlist?list=PLNmsVeXQBfxYLJbd_wSZnJ0CqtaSm4Tfy','문법'],['Words and Stories','https://www.youtube.com/playlist?list=PLNmsVeXQBfxba0Ei96bQ8PD5i0OsSuaeM','숙어·표현']]}};
function rContent(){
  var isV=S.tab==='vocab';
  document.getElementById('vt-bbc').className=S.tab==='bbc'?'on':'';
  document.getElementById('vt-voa').className=S.tab==='voa'?'on':'';
  document.getElementById('vt-vocab').className=isV?'on':'';
  document.getElementById('clist').style.display=isV?'none':'block';
  document.getElementById('varea').style.display=isV?'block':'none';
  if(isV){rVocab();return;}
  var t=CT[S.tab];
  document.getElementById('clist').innerHTML='<a href="'+t.url+'" target="_blank" rel="noopener" class="olink '+t.cls+'" onclick="event.preventDefault();openUrl(\''+t.url+'\')">'+t.label+' 유튜브 바로가기 →</a>'+t.items.map(function(a){return'<a href="'+a[1]+'" target="_blank" rel="noopener" class="citem" onclick="event.preventDefault();openUrl(\''+a[1]+'\')"><span style="font-size:13px;font-weight:600">'+a[0]+'</span><span class="cdesc">'+a[2]+'</span></a>';}).join('');
}

// ── Vocab ──
function openVM(editId){document.getElementById('vm').style.display='flex';document.getElementById('vm-en').value='';document.getElementById('vm-ko').value='';document.getElementById('vm-eid').value='';var sc='단어';if(editId){var it=vocD.find(function(v){return v.id===editId;});if(it){document.getElementById('vm-en').value=it.en;document.getElementById('vm-ko').value=it.ko;sc=it.cat;document.getElementById('vm-eid').value=editId;}document.getElementById('vm-title').textContent='수정';}else document.getElementById('vm-title').textContent='단어 추가';document.getElementById('vm-cats').innerHTML=VCATS.map(function(c){return'<button class="'+(c===sc?'on':'')+'" onclick="pickC(this,\''+c+'\')">'+c+'</button>';}).join('');setTimeout(function(){document.getElementById('vm-en').focus();},200);}
window.openVM=openVM;
function closeVM(){document.getElementById('vm').style.display='none';}window.closeVM=closeVM;
function pickC(btn,c){document.querySelectorAll('#vm-cats button').forEach(function(b){b.className='';});btn.className='on';}window.pickC=pickC;
function saveV(){var en=document.getElementById('vm-en').value.trim(),ko=document.getElementById('vm-ko').value.trim();var ac=document.querySelector('#vm-cats button.on');var cat=ac?ac.textContent:'단어';var eid=document.getElementById('vm-eid').value;if(!en||!ko){alert('입력해주세요');return;}if(eid){var idx=vocD.findIndex(function(v){return v.id===eid;});if(idx>=0){vocD[idx].en=en;vocD[idx].ko=ko;vocD[idx].cat=cat;}}else vocD.unshift({id:'v'+Date.now(),en:en,ko:ko,cat:cat,date:TD});svV();closeVM();rVocab();}window.saveV=saveV;
function delV(id){if(!confirm('삭제?'))return;vocD=vocD.filter(function(v){return v.id!==id;});svV();rVocab();}window.delV=delV;
function setVF(c){vFil=c;rVocab();}window.setVF=setVF;
function rVocab(){
  var fE=document.getElementById('vfl'),lE=document.getElementById('vlist');
  var cnts={};VCATS.forEach(function(c){cnts[c]=0;});vocD.forEach(function(v){if(cnts[v.cat]!==undefined)cnts[v.cat]++;});
  fE.innerHTML='<button class="vfb'+(vFil==='all'?' on':'')+'" onclick="setVF(\'all\')">전체('+vocD.length+')</button>'+VCATS.map(function(c){return cnts[c]>0?'<button class="vfb'+(vFil===c?' on':'')+'" onclick="setVF(\''+c+'\')">'+c+'('+cnts[c]+')</button>':'';}).join('')+(vocD.length>=3?'<button class="vfb" onclick="startFC()" style="background:var(--warm);color:#fff;border-color:var(--warm)">🃏 카드</button>':'');
  document.getElementById('fcarea').style.display='none';lE.style.display='block';
  var fl=vFil==='all'?vocD:vocD.filter(function(v){return v.cat===vFil;});
  if(!fl.length){lE.innerHTML='<div class="vempty">단어를 추가해보세요! 📚</div>';return;}
  var grp={};fl.forEach(function(v){if(!grp[v.cat])grp[v.cat]=[];grp[v.cat].push(v);});
  var h='';(vFil==='all'?VCATS:[vFil]).forEach(function(cat){var its=grp[cat];if(!its)return;h+='<div class="vgh"><span>'+cat+'</span><span class="cnt">'+its.length+'</span></div>';its.forEach(function(v){var d=new Date(v.date+'T12:00:00');h+='<div class="vcd"><div class="va"><button onclick="openVM(\''+v.id+'\')" title="수정">✏️</button><button onclick="delV(\''+v.id+'\')" title="삭제">🗑️</button></div><div class="ven">'+esc(v.en)+'</div><div class="vko">'+esc(v.ko)+'</div><div class="vdt">'+(d.getMonth()+1)+'/'+d.getDate()+(v.src?' · '+esc(v.src):'')+(v.auto?' <span class="ai-badge">AI</span>':'')+'</div></div>';});});
  lE.innerHTML=h;
}
function startFC(){var fl=vFil==='all'?vocD.slice():vocD.filter(function(v){return v.cat===vFil;});if(fl.length<1)return;for(var i=fl.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=fl[i];fl[i]=fl[j];fl[j]=t;}fcL=fl;fcI=0;fcSh=false;document.getElementById('vlist').style.display='none';document.querySelector('.vadd').style.display='none';document.getElementById('vfl').style.display='none';rFC();}window.startFC=startFC;
function rFC(){var a=document.getElementById('fcarea');a.style.display='block';if(fcI>=fcL.length){a.innerHTML='<div class="fcw"><div style="font-size:36px;margin-bottom:10px">🎉</div><div style="font-size:15px;font-weight:900">'+fcL.length+'개 완료!</div><button class="sb pr" onclick="exitFC()" style="margin-top:12px">돌아가기</button></div>';return;}var v=fcL[fcI];a.innerHTML='<div class="fcw"><div class="fccnt">'+(fcI+1)+'/'+fcL.length+'</div><div class="fcc" onclick="fcSh=true;rFC()"><div class="fccat">'+esc(v.cat)+'</div><div class="fcen">'+esc(v.en)+'</div><div class="fcko'+(fcSh?' sh':'')+'">'+esc(v.ko)+'</div>'+(fcSh?'':'<div class="fch">탭하면 뜻 보기</div>')+'</div><div class="fcnav"><button onclick="exitFC()">✕</button><button class="pr" onclick="fcI++;fcSh=false;rFC()">다음 →</button></div></div>';}
window.rFC=rFC;
function exitFC(){document.getElementById('fcarea').style.display='none';document.getElementById('vlist').style.display='block';document.querySelector('.vadd').style.display='block';document.getElementById('vfl').style.display='flex';rVocab();}window.exitFC=exitFC;

// ── Main render ──
function render(){try{
  var dn=!!S.history[TD],st=streak(),fd=fDay(),nl=nLvl();
  document.getElementById('h-date').textContent=tFull();
  var nb=document.getElementById('notif-btn');nb.textContent=S.notif?'🔔 끄기':'🔕 알림';nb.className='nb'+(S.notif?' on':'');
  var ht=document.getElementById('hero-t');if(ht){if(dn)ht.textContent='오늘도 잘 했어요! 🌟';else if(nl>=2)ht.textContent='아직 안 들었어요! 🔥';else ht.textContent='오늘도 영어 듣기, 시작!';}
  var qb=document.getElementById('qbox');if(qb){var q=getQ();qb.innerHTML='<div class="qen">"'+q.e+'"</div><div class="qko">'+q.k+'</div><div class="qby">— '+q.b+'</div>';}
  var nT=['','영어 듣기 아직 안 했어요!','오후예요! 지금 안 하면 미뤄요 😅','자기 전에 꼭!! 🚨'];
  document.getElementById('nag-w').innerHTML=nl>0?'<div class="nag l'+nl+'">'+nT[nl]+'</div>':'';
  var pw=document.getElementById('prog-w');
  if(fd){
    var el=dBtw(fd,TD)+1;var wNum=Math.ceil(el/7);
    var now=new Date(),startOfYear=new Date(now.getFullYear(),0,1),yearDay=Math.ceil((now-startOfYear)/864e5),yearWeek=Math.ceil(yearDay/7);
    var todayMin=watchLog[TD]?Math.floor(watchLog[TD]/60):0;
    pw.innerHTML='<div class="slb">진행 현황</div><div class="ibox">'+
      '<div class="il"><span>시작일</span><span class="v">'+fKo(fd)+'</span></div>'+
      '<div class="il"><span>경과 (오늘은 '+now.getFullYear()+'년 '+yearWeek+'주 '+yearDay+'일째입니다)</span><span class="v">'+wNum+'주째 · '+el+'일차</span></div>'+
      '<div class="il"><span>연속</span><span class="v" style="color:var(--warm)">'+st+'일 🔥</span></div>'+
      '<div class="il"><span>주간 목표</span><span class="v">'+S.wGoal+'일 / '+S.dMin+'분</span></div>'+
      (todayMin>0?'<div class="il"><span>오늘 학습</span><span class="v" style="color:var(--pri)">'+todayMin+'분</span></div>':'')+
      '</div>';
  }else pw.innerHTML='<div style="font-size:12px;color:var(--tx2);padding:4px 0">첫 완료를 해보세요!</div>';
  document.getElementById('sg3').innerHTML=
    '<div class="sc"><div class="n" style="color:var(--warm)">'+st+'</div><div class="l">연속🔥</div></div>'+
    '<div class="sc"><div class="n">'+tDone()+'</div><div class="l">누적</div></div>'+
    '<div class="sc'+(dn?' dn':'')+'"><div class="n" style="color:'+(dn?'var(--pri)':'var(--acc)')+'">'+(dn?'✓':'✗')+'</div><div class="l">오늘</div></div>';
  var wD=gWeek(),wl=document.getElementById('wlbl');
  var d0=new Date(wD[0]+'T12:00:00'),d6=new Date(wD[6]+'T12:00:00');
  if(wl)wl.textContent=(d0.getMonth()+1)+'/'+ d0.getDate()+' ~ '+(d6.getMonth()+1)+'/'+d6.getDate();
  document.getElementById('wg').innerHTML=wD.map(function(day,i){
    var id=!!S.history[day],it=day===TD,iF=day>TD;
    var bc=id?'done':it?'today':iF?'fut':'past';
    var nc=i===0?'dn-txt su':i===6?'dn-txt sa':it?'dn-txt tl':'dn-txt';
    var dt=new Date(day+'T12:00:00');
    return'<div class="dc"><div class="db '+bc+'">'+(id?'✓':'')+'</div><div class="'+nc+'">'+DN[i]+'</div><div class="dn-txt'+(it?' tl':'')+'">'+dt.getDate()+'</div></div>';
  }).join('');
  rAA();rContent();rPhoto();
}catch(e){console.error('render:',e);}}

// ── SW ──
try{if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(function(){});}catch(e){}
// ── Init ──
try{render();loadFeeds();if(S.notif)startNag();}catch(e){console.error('Init:',e);}
})();
